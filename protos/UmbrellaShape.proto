PROTO UmbrellaShape [
  field SFVec3f    translation 0 0 0
  field SFRotation rotation    0 0 1 0
  field SFColor    color       0.8 0.1 0.1
  field SFVec3f    scale       1.0 1.0 1.0
]
{
  Transform {
    translation IS translation
    rotation IS rotation
    scale IS scale
    children [
      # Stick (Tige centrale) - extends upward from drone
      Transform {
        translation 0 0 0.3
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.2 0.2 0.2
              roughness 0.8
              metalness 0.5
            }
            geometry Cylinder {
              radius 0.015
              height 0.5
            }
          }
        ]
      }
      # Canopy (Cône inversé - partie large en haut comme un parapluie)
      Transform {
        translation 0 0 0.6
        rotation 1 0 0 3.14159
        children [
          Shape {
            appearance PBRAppearance {
              baseColor IS color
              roughness 0.5
              metalness 0.1
            }
            geometry Cone {
              bottomRadius 0.6
              height 0.2
              subdivision 16
            }
          }
        ]
      }
    ]
  }
}
